name: Deploy Treasury Risk API

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: api-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          test -n "$PROD_HOST"
          test -n "$PROD_USER"
          test -n "$PROD_SSH_KEY"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server host key
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
        run: |
          set -eu
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -eu
          DEST="/home/$PROD_USER/treasury-risk-api"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "mkdir -p $DEST"
          
          # Sync all API code (excluding node_modules and git folders)
          rsync -az --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -p $PROD_PORT -i ~/.ssh/id_ed25519" \
            ./ "$PROD_USER@$PROD_HOST:$DEST/"

      - name: Build and Restart Docker Container
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -eu
          DEST="/home/$PROD_USER/treasury-risk-api"
          # Stop the container if it's running
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "cd $DEST && sudo docker compose down" || true
          
          # Build the image with security flags to bypass Oracle Cloud SELinux/Seccomp restrictions
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "cd $DEST && sudo podman build --security-opt seccomp=unconfined --security-opt label=disable -t localhost/treasury-risk-api:latest ."
            
          # Start the container
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "cd $DEST && sudo docker compose up -d"
