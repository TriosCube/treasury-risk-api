name: Deploy Treasury Risk API

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: api-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          test -n "$PROD_HOST"
          test -n "$PROD_USER"
          test -n "$PROD_SSH_KEY"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server host key
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
        run: |
          set -eu
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Ensure server repo and sync latest code
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_BRANCH: ${{ github.ref_name }}
          REPO_URL: https://github.com/TriosCube/treasury-risk-api.git
        run: |
          set -eu
          DEST="/home/$PROD_USER/treasury-risk-api"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "set -eu
            if [ ! -d '$DEST/.git' ]; then
              rm -rf '$DEST'
              git clone --branch '$TARGET_BRANCH' '$REPO_URL' '$DEST'
            fi
            cd '$DEST'
            git fetch origin
            git reset --hard 'origin/$TARGET_BRANCH'
          "

      - name: Run server deploy script
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -eu
          DEST="/home/$PROD_USER/treasury-risk-api"

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "cd $DEST && bash deploy.sh"

      - name: Verify nginx-to-api internal connectivity
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_USER: ${{ secrets.PROD_USER }}
          NGINX_CONTAINER: ${{ secrets.NGINX_CONTAINER || '' }}
          INTERNAL_API_HEALTH_URL: ${{ secrets.INTERNAL_API_HEALTH_URL || 'http://treasury-risk-api:4000/health' }}
        run: |
          set -eu
          TARGET_CONTAINER="$NGINX_CONTAINER"

          if [ -z "$TARGET_CONTAINER" ]; then
            TARGET_CONTAINER="$(ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
              "sudo podman ps --format '{{.Names}}' | grep -E 'nginx' | head -n 1")"
          fi

          if [ -z "$TARGET_CONTAINER" ]; then
            echo "Could not auto-detect nginx container name. Set NGINX_CONTAINER secret." >&2
            exit 1
          fi

          echo "Using nginx container: $TARGET_CONTAINER"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "sudo podman exec '$TARGET_CONTAINER' curl -fsS '$INTERNAL_API_HEALTH_URL' >/dev/null"

      - name: Verify public API health endpoint
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL || 'https://api.altisly.com/health' }}
        run: |
          set -eu
          strict_failed=true

          for attempt in 1 2 3 4 5; do
            if curl -fsS "$API_HEALTH_URL" >/dev/null; then
              strict_failed=false
              echo "Public health check (strict TLS) passed on attempt $attempt."
              break
            fi

            echo "Public health check (strict TLS) retry $attempt/5 failed, waiting..."
            sleep 6
          done

          if [ "$strict_failed" = false ]; then
            exit 0
          fi

          echo "Strict TLS public check failed. Retrying with --insecure to detect cert-chain-only failures..."
          if curl -kfsS "$API_HEALTH_URL" >/dev/null; then
            echo "::warning::Public endpoint is reachable, but TLS chain validation failed on runner. Fix certificate/fullchain on api.altisly.com."
            exit 0
          fi

          echo "Public health check failed (both strict TLS and insecure): $API_HEALTH_URL" >&2
          exit 1

      - name: Dump server diagnostics on failure
        if: ${{ failure() }}
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_USER: ${{ secrets.PROD_USER }}
          INTERNAL_API_HEALTH_URL: ${{ secrets.INTERNAL_API_HEALTH_URL || 'http://treasury-risk-api:4000/health' }}
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL || 'https://api.altisly.com/health' }}
        run: |
          set +e
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "set +e
            echo '=== podman ps ==='
            sudo podman ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            echo
            echo '=== treasury-risk-api logs (last 200) ==='
            sudo podman logs --tail 200 treasury-risk-api || true

            echo
            echo '=== nginx container auto-detect ==='
            NGINX_NAME=\$(sudo podman ps --format '{{.Names}}' | grep -E 'nginx' | head -n 1)
            echo \"NGINX_NAME=\$NGINX_NAME\"

            if [ -n \"\$NGINX_NAME\" ]; then
              echo
              echo '=== nginx->api curl from inside nginx container ==='
              sudo podman exec \"\$NGINX_NAME\" curl -i --max-time 10 '$INTERNAL_API_HEALTH_URL' || true

              echo
              echo '=== nginx logs (last 200) ==='
              sudo podman logs --tail 200 \"\$NGINX_NAME\" || true
            fi

            echo
            echo '=== host curl checks ==='
            curl -i --max-time 10 http://127.0.0.1:4000/health || true
            curl -k -i --max-time 10 '$API_HEALTH_URL' || true

            echo
            echo '=== api nginx conf (if present) ==='
            sudo cat /home/$PROD_USER/atreasury-main-app/nginx/conf.d/api.altisly.com.conf || true

            echo
            echo '=== network inspect (filtered) ==='
            sudo podman network ls || true
            sudo podman network inspect atreasury-main-app_atreasury-uat-net || true
          "
